name: nature_ai_app
description: "Nature & AI Intelligence - Environmental Monitoring System"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.2
  google_sign_in: ^6.2.2

  # State Management
  provider: ^6.1.2

  # UI Components
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  fl_chart: ^0.70.1
  shimmer: ^3.0.0
  lottie: ^3.2.1

  # HTTP & API
  http: ^1.2.2
  dio: ^5.7.0

  # Local Storage
  shared_preferences: ^2.3.3

  # Image & Media
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.1
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
